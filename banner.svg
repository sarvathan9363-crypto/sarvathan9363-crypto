<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Iron Man exact colors: deep crimson + metallic gold -->
    <radialGradient id="orbRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C41E1E" stop-opacity="0.45"/>
      <stop offset="45%"  stop-color="#8B0000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFF8DC"/>
      <stop offset="25%"  stop-color="#D4AF37"/>
      <stop offset="55%"  stop-color="#C9A84C"/>
      <stop offset="78%"  stop-color="#C41E1E"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4AF37"/>
      <stop offset="50%"  stop-color="#C41E1E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E53935"/>
      <stop offset="50%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#C41E1E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="10" fill="#0b0101"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="36" x2="860" y2="36" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="72" x2="860" y2="72" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="108" x2="860" y2="108" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="144" x2="860" y2="144" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="860" y2="180" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="36"  y1="0" x2="36"  y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="72"  y1="0" x2="72"  y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="108" y1="0" x2="108" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="144" y1="0" x2="144" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="216" y1="0" x2="216" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="252" y1="0" x2="252" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="288" y1="0" x2="288" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="324" y1="0" x2="324" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="396" y1="0" x2="396" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="432" y1="0" x2="432" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="468" y1="0" x2="468" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="504" y1="0" x2="504" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="576" y1="0" x2="576" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="612" y1="0" x2="612" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="648" y1="0" x2="648" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="684" y1="0" x2="684" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="756" y1="0" x2="756" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="792" y1="0" x2="792" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
    <line x1="828" y1="0" x2="828" y2="220" stroke="#C9A84C" stroke-width="0.5"/>
  </g>

  <!-- Red glow orb top-right -->
  <ellipse cx="790" cy="-10" rx="200" ry="200" fill="url(#orbRed)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Gold glow orb bottom-left -->
  <ellipse cx="280" cy="290" rx="130" ry="130" fill="url(#orbGold)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" begin="1.7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Border -->
  <rect width="860" height="220" rx="10" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.5"/>

  <!-- Left gold bar -->
  <rect x="0" y="0" width="4" height="220" rx="2" fill="url(#barGrad)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanline animation -->
  <rect x="0" y="0" width="860" height="2" fill="url(#scanGrad)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,222" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents - gold -->
  <path d="M14,12 L14,20 M14,12 L22,12" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M846,12 L846,20 M846,12 L838,12" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M14,208 L14,200 M14,208 L22,208" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M846,208 L846,200 M846,208 L838,208" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- ===== ARC REACTOR (center-right) ===== -->
  <g transform="translate(758,110)">
    <!-- Outer ring red+gold spinning CW -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="82 244" stroke-dashoffset="0" opacity="0.9"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#C41E1E" stroke-width="2" stroke-dasharray="82 244" stroke-dashoffset="163" opacity="0.8"/>
    </g>
    <!-- Mid ring CCW -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4.5s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="38" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="60 179" opacity="0.6"/>
      <circle cx="0" cy="0" r="38" fill="none" stroke="#E53935" stroke-width="1.5" stroke-dasharray="60 179" stroke-dashoffset="120" opacity="0.7"/>
    </g>
    <!-- Inner ring CW fast -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="40 124" opacity="0.5"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#C41E1E" stroke-width="1.5" stroke-dasharray="40 124" stroke-dashoffset="82" opacity="0.5"/>
    </g>
    <!-- Core glow -->
    <circle cx="0" cy="0" r="16" fill="url(#coreGrad)" filter="url(#coreGlow)">
      <animate attributeName="r" values="14;17;14" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Core bright center -->
    <circle cx="0" cy="0" r="6" fill="#FFF8DC" opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Hex decorations -->
  <g transform="translate(670,188)" opacity="0.3">
    <polygon points="5,0 9,2.5 9,7.5 5,10 1,7.5 1,2.5" fill="#C9A84C">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="18,0 22,2.5 22,7.5 18,10 14,7.5 14,2.5" fill="#C41E1E">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="31,0 35,2.5 35,7.5 31,10 27,7.5 27,2.5" fill="#C9A84C">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="44,0 48,2.5 48,7.5 44,10 40,7.5 40,2.5" fill="#C41E1E">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ===== TEXT CONTENT ===== -->

  <!-- Name: SARVA (red) + THAN C (gold) -->
  <text font-family="'Trebuchet MS', sans-serif" font-size="44" font-weight="900" letter-spacing="4">
    <tspan x="32" y="102" fill="#E53935" filter="url(#redGlow)" opacity="0">SARVA
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze"/>
    </tspan>
    <tspan fill="#D4AF37" filter="url(#goldGlow)" opacity="0">THAN C
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.4s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Divider line red→gold -->
  <rect x="32" y="114" width="0" height="2" rx="1" fill="url(#divGrad)">
    <animate attributeName="width" from="0" to="290" dur="1s" begin="0.8s" fill="freeze"/>
  </rect>

  <!-- Roles — cycling with clip mask -->
  <clipPath id="roleClip">
    <rect x="32" y="124" width="360" height="22"/>
  </clipPath>

  <g clip-path="url(#roleClip)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>

    <!-- Dot -->
    <circle cx="40" cy="135" r="3.5" fill="#D4AF37">
      <animate attributeName="fill"
        values="#D4AF37;#ef9a9a;#C9A84C;#D4AF37"
        dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Role text cycling -->
    <text font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" text-anchor="start">
      <tspan x="52" y="140">
        <animate attributeName="y"
          values="140;118;118;96;96;140;140"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="fill"
          values="#D4AF37;#D4AF37;#ef9a9a;#ef9a9a;#C9A84C;#C9A84C;#D4AF37"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite"/>
        EEE Student
      </tspan>
    </text>
    <text font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" text-anchor="start">
      <tspan x="52" y="162">
        <animate attributeName="y"
          values="162;140;140;118;118;162;162"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="fill"
          values="#ef9a9a;#ef9a9a;#C9A84C;#C9A84C;#D4AF37;#D4AF37;#ef9a9a"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite"/>
        Full Stack Developer
      </tspan>
    </text>
    <text font-family="'Trebuchet MS', sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" text-anchor="start">
      <tspan x="52" y="184">
        <animate attributeName="y"
          values="184;162;162;140;140;184;184"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="fill"
          values="#C9A84C;#C9A84C;#D4AF37;#D4AF37;#ef9a9a;#ef9a9a;#C9A84C"
          keyTimes="0;0.3;0.33;0.63;0.66;0.96;1"
          dur="7.5s" repeatCount="indefinite"/>
        Freelancer
      </tspan>
    </text>
  </g>

</svg>
